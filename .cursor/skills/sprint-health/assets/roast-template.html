<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root{
    --bg:#0f1115; --ink:#f2f4f8; --muted:#a8b0bd; --line:#2a2f3a;
    --red:#ff5a52; --amber:#ffc247; --green:#4bd07f; --blue:#5aa9ff;
    --card:#171a21; --accent:#ff7a18;
  }
  *{box-sizing:border-box}
  body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
    line-height:1.55;max-width:900px;margin:0 auto;padding:28px 22px;background:var(--bg)}
  h1{font-size:28px;margin:0 0 2px;background:linear-gradient(90deg,#ff7a18,#ff5a52,#ffc247);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  h2{font-size:19px;margin:28px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  p{margin:8px 0}
  a{color:var(--blue);text-decoration:none}
  .sub{color:var(--muted);font-size:14px;margin:0 0 14px}
  .pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:13px;font-weight:700;margin-right:6px;
    background:#2a1414;color:var(--red);border:1px solid #4a2020}
  .banner{background:linear-gradient(135deg,#1b1410,#241a12);border:1px solid #3a2a18;
    border-left:4px solid var(--accent);border-radius:10px;padding:16px 20px;margin:16px 0;font-size:15px}
  .award{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin:12px 0}
  .award .title{font-size:16px;font-weight:800;margin-bottom:2px}
  .award .who{color:var(--amber);font-weight:700}
  .award .burn{color:var(--muted);font-style:italic;margin-top:6px}
  .stat{color:var(--red);font-weight:800}
  table{border-collapse:collapse;width:100%;margin:10px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:7px 10px;text-align:left}
  th{background:#1c2029;font-weight:700}
  td.c,th.c{text-align:center;white-space:nowrap}
  ul{margin:8px 0;padding-left:22px}
  li{margin:5px 0}
  .serious{background:#101a12;border:1px solid #24402c;border-left:4px solid var(--green);
    border-radius:10px;padding:14px 18px;margin:16px 0}
  .foot{color:var(--muted);font-size:12px;margin-top:26px;border-top:1px solid var(--line);padding-top:10px}
  .big{font-size:30px;font-weight:900}
  .wip{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
  .wipbox{flex:1;min-width:150px;border:1px solid var(--line);border-radius:10px;padding:12px 16px;background:var(--card)}
  .g{color:var(--green)} .o{color:var(--amber)} .b{color:var(--blue)} .r{color:var(--red)}
</style>
</head>
<body>

<h1>{{TITLE}}</h1>
<p class="sub">{{SUBTITLE}}</p>

<!-- ROAST_BODY -->

</body>
</html>
